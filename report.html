<!DOCTYPE html>
<html>
<head>
    <title>Report Item - UNI Lost & Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.min.css">
</head>

<body>
    <!-- Top bar -->
    <div class="topbar">
        <h1 class="campus-name"> UNI </h1>
        <h1 class="page-name"> Report Lost / Found Item </h1>
        <div class="menu-container">
            <button class="menu-btn" onclick="toggleMenu()">
                <i class="fa-solid fa-bars"></i>
            </button>
            <!-- Menu Modal Overlay -->
            <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
            
            <!-- Sliding Menu Panel -->
            <nav class="menu-panel" id="menuPanel">
                <div class="menu-header">
                    <h3>Menu</h3>
                    <button class="close-menu" onclick="toggleMenu()">
                        <i class="fa-solid fa-times"></i>
                    </button>
                </div>
                <ul class="menu-items">
                    <li>
                        <a href="dashboard.html">
                            <i class="fa-solid fa-home"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li>
                        <a href="report.html" class="active">
                            <i class="fa-solid fa-flag"></i>
                            <span>Report Item</span>
                        </a>
                    </li>
                    <li>
                        <a href="myreport.html">
                            <i class="fa-solid fa-list"></i>
                            <span>My Reports</span>
                        </a>
                    </li>
                    <li>
                        <a href="view.html">
                            <i class="fa-solid fa-eye"></i>
                            <span>View Items</span>
                        </a>
                    </li>
                    <li class="divider"></li>
                    <li>
                        <a href="index.html" class="logout">
                            <i class="fa-solid fa-sign-out-alt"></i>
                            <span>Logout</span>
                        </a>
                    </li>
                </ul>
                <div class="menu-footer">
                    <p>UNI Lost & Found System</p>
                    <p>&copy; 2026</p>
                </div>
            </nav>
        </div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
        <div class="progress-steps">
            <div class="step active" id="step1">
                <div class="step-circle">1</div>
                <span class="step-label">Category</span>
            </div>
            <div class="step" id="step2">
                <div class="step-circle">2</div>
                <span class="step-label">Details</span>
            </div>
            <div class="step" id="step3">
                <div class="step-circle">3</div>
                <span class="step-label">Contact</span>
            </div>
        </div>
    </div>

    <section class="report-form-section">
        <div class="report-container">
            <form id="reportForm" class="report-form">
                <!-- Section 1: Category -->
                <div class="form-section active" id="section1">
                    <h2 class="section-title">
                        <i class="fa-solid fa-tag"></i>
                        Select Category
                    </h2>
                    <div class="form-group">
                        <div class="category-options">
                            <div class="category-option">
                                <input type="radio" id="categoryLost" name="category" value="Lost" required>
                                <label for="categoryLost" class="category-label">
                                    <i class="fa-solid fa-circle-exclamation"></i>
                                    <span>Lost Item</span>
                                </label>
                            </div>
                            <div class="category-option">
                                <input type="radio" id="categoryFound" name="category" value="Found" required>
                                <label for="categoryFound" class="category-label">
                                    <i class="fa-solid fa-circle-check"></i>
                                    <span>Found Item</span>
                                </label>
                            </div>
                        </div>
                    </div>
                    <div class="section-navigation">
                        <button type="button" class="btn-next" onclick="nextSection()" id="nextToDetails">
                            Next <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </div>
                </div>

                <!-- Section 2: Details -->
                <div class="form-section" id="section2">
                    <h2 class="section-title">
                        <i class="fa-solid fa-pen-to-square"></i>
                        Item Details
                    </h2>
                    <div class="form-group">
                        <label for="reportTitle">
                            <i class="fa-solid fa-heading"></i> Title *
                        </label>
                        <input 
                            type="text" 
                            id="reportTitle" 
                            name="title" 
                            placeholder="Enter a title" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="reportDescription">
                            <i class="fa-solid fa-align-left"></i> Description *
                        </label>
                        <textarea 
                            id="reportDescription" 
                            name="description" 
                            placeholder="Add description ..." 
                            rows="4"
                            required
                        ></textarea>
                    </div>

                    <div class="form-group">
                        <label for="reportLocation">
                            <i class="fa-solid fa-location-dot"></i> Location *
                        </label>
                        <input 
                            type="text" 
                            id="reportLocation" 
                            name="location" 
                            placeholder="e.g. TTS, La Place Cafe" 
                            required
                        >
                    </div>

                    <div class="section-navigation">
                        <button type="button" class="btn-prev" onclick="prevSection()">
                            <i class="fa-solid fa-arrow-left"></i> Back
                        </button>
                        <button type="button" class="btn-next" onclick="nextSection()" id="nextToContact">
                            Next <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </div>
                </div>

                <!-- Section 3: Contact -->
                <div class="form-section" id="section3">
                    <h2 class="section-title">
                        <i class="fa-solid fa-address-card"></i>
                        Contact Information
                    </h2>
                    <div class="form-group">
                        <label for="reportContactEmail">
                            <i class="fa-solid fa-envelope"></i> Contact Email *
                        </label>
                        <input 
                            type="email" 
                            id="reportContactEmail" 
                            name="contactEmail" 
                            placeholder="xxxx@uni.edu.my" 
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="reportContactPhone">
                            <i class="fa-solid fa-phone"></i> Contact Phone *
                        </label>
                        <div class="phone-input-container">
                            <span class="phone-prefix">+60</span>
                            <input 
                                type="tel" 
                                id="reportContactPhone" 
                                name="contactPhone" 
                                placeholder="123456789" 
                                pattern="[0-9]{8,11}" 
                                required
                            >
                        </div>
                    </div>

                    <div class="section-navigation">
                        <button type="button" class="btn-prev" onclick="prevSection()">
                            <i class="fa-solid fa-arrow-left"></i> Back
                        </button>
                        <button type="submit" class="btn-submit">
                            Submit Report <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </form>
        </div>          
    </section>

    <script src="script.min.js?v=4"></script>
</body>
</html>
